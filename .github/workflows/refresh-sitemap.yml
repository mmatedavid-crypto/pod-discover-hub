name: Refresh sitemap

on:
  workflow_dispatch:
  schedule:
    # Naponta 04:30 UTC (06:30 CEST) — még pirkadat előtt friss sitemap.
    - cron: "30 4 * * *"

concurrency:
  group: refresh-sitemap
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    name: Generate + commit sitemap
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install supabase-js
        run: npm install --no-save @supabase/supabase-js@^2

      - name: Generate sitemap
        env:
          SUPABASE_URL: https://yoxewklaybougzpmzvkg.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          rm -f public/sitemaps/*.xml
          node scripts/gen-sitemap.mjs

      - name: Commit + push if changed
        run: |
          git config user.name  "podiverzum-bot"
          git config user.email "bot@podiverzum.hu"
          git add public/sitemap.xml public/sitemaps/
          if git diff --cached --quiet; then
            echo "No sitemap changes."
            exit 0
          fi
          git commit -m "chore(sitemap): daily refresh $(date -u +%Y-%m-%d)"
          git push
