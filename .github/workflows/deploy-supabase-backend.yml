name: Deploy Supabase backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - "scripts/verify-production-backend.mjs"
      - "scripts/verify-production-pipeline.mjs"
      - ".github/workflows/deploy-supabase-backend.yml"

concurrency:
  group: deploy-supabase-backend
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: yoxewklaybougzpmzvkg
  VITE_SUPABASE_URL: https://yoxewklaybougzpmzvkg.supabase.co

jobs:
  deploy:
    name: Deploy migrations and edge functions
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Preflight migrations
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_READONLY_DATABASE_URL }}
        run: npm run preflight:migrations -- --last=40

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          for dir in supabase/functions/*; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            case "$name" in
              _*) continue ;;
            esac
            if [ -f "$dir/index.ts" ]; then
              echo "::group::Deploy $name"
              supabase functions deploy "$name" --project-ref "$SUPABASE_PROJECT_REF"
              echo "::endgroup::"
            fi
          done

      - name: Verify production backend
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: npm run verify:production-backend

      - name: Verify production pipeline
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_READONLY_DATABASE_URL }}
        run: npm run verify:production-pipeline
